<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <style>
        body {
            font-family: sans-serif;
            padding: 16px;
            min-width: 220px;
        }

        h3 {
            margin: 0 0 12px;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 8px;
            background: #c0392b;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
        }

        button:hover {
            background: #e74c3c;
        }

        #status {
            margin-top: 10px;
            font-size: 12px;
            color: #555;
        }

        .secondary-btn {
            background: #3498db;
            margin-top: 8px;
        }

        .secondary-btn:hover {
            background: #2980b9;
        }

        #viewedResults {
            margin-top: 12px;
            font-size: 12px;
            max-height: 550px;
            overflow: auto;
            resize: vertical;
        }

        #viewedResults.expanded {
            min-height: 400px;
        }

        #viewedResults h4 {
            margin: 12px 0 6px;
            font-size: 12px;
            color: #333;
        }

        #viewedResults ul {
            margin: 0;
            padding-left: 18px;
        }

        #viewedResults li {
            margin: 2px 0;
        }

        #viewedResults .clear-btn {
            margin-bottom: 12px;
        }
    </style>
</head>

<body>
    <h3>Nunus</h3>
    <button id="showViewedBtn" class="secondary-btn">Show Viewed Articles</button>
    <div id="status"></div>
    <div id="viewedResults"></div>
    <script src="popup.js"></script>
</body>

</html>
