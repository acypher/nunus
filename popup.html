<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <style>
        body {
            font-family: sans-serif;
            padding: 16px;
            min-width: 240px;
        }

        h3 {
            margin: 0 0 12px;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 8px;
            background: #c0392b;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
        }

        button:hover {
            background: #e74c3c;
        }

        #status {
            margin-top: 10px;
            font-size: 12px;
            color: #555;
        }

        .secondary-btn {
            background: #3498db;
            margin-top: 8px;
        }

        .secondary-btn:hover {
            background: #2980b9;
        }

        .show-panel-btn + .show-panel-btn {
            margin-top: 8px;
        }

        #viewedResults {
            margin-top: 12px;
            font-size: 12px;
            max-height: 550px;
            overflow: auto;
            resize: vertical;
        }

        #viewedResults.expanded {
            min-height: 400px;
        }

        #viewedResults h4 {
            margin: 12px 0 6px;
            font-size: 12px;
            color: #333;
        }

        #viewedResults ul {
            margin: 0;
            padding-left: 18px;
        }

        #viewedResults li {
            margin: 2px 0;
        }

        .article-panel-toolbar {
            display: flex;
            gap: 6px;
            align-items: center;
            margin: 8px 0 8px;
        }

        #articleListFilter {
            flex: 1;
            min-width: 0;
            padding: 6px 8px;
            font-size: 12px;
            border: 1px solid #bdbdbd;
            border-radius: 4px;
            box-sizing: border-box;
        }

        #viewedResults .copy-list-btn {
            width: auto;
            flex-shrink: 0;
            padding: 6px 10px;
            font-size: 11px;
            margin: 0;
            background: #607d8b;
            border-radius: 4px;
        }

        #viewedResults .copy-list-btn:hover {
            background: #546e7a;
        }

        #viewedResults .article-title-list {
            margin: 0;
            padding-left: 18px;
            user-select: text;
            cursor: text;
        }

        #viewedResults .article-title-list li {
            margin: 4px 0;
            line-height: 1.4;
            user-select: text;
        }

        #viewedResults .article-title-list .article-title {
            user-select: text;
            cursor: text;
        }

        #viewedResults .clear-btn {
            width: auto;
            max-width: 100%;
            display: inline-block;
            margin-bottom: 12px;
            padding: 8px 14px;
            border-radius: 12px;
            box-sizing: border-box;
        }

        /* Native HTML disclosure: summary shows a chevron that rotates when open. */
        .enough-disclosure {
            margin: 0 0 14px;
            border: 1px solid #cfd8dc;
            border-radius: 6px;
            background: #fafafa;
        }

        .enough-disclosure summary {
            list-style: none;
            padding: 10px 12px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            user-select: none;
        }

        .enough-disclosure summary::-webkit-details-marker {
            display: none;
        }

        .enough-disclosure summary .chevron {
            display: inline-block;
            width: 0.45em;
            height: 0.45em;
            border-right: 2px solid #444;
            border-bottom: 2px solid #444;
            transform: rotate(-45deg);
            transition: transform 0.2s ease;
            flex-shrink: 0;
        }

        .enough-disclosure[open] summary .chevron {
            transform: rotate(45deg);
        }

        .enough-disclosure .disclosure-body {
            padding: 0 12px 12px;
            border-top: 1px solid #eceff1;
        }

        .enough-disclosure .disclosure-hint {
            font-size: 11px;
            color: #607d8b;
            margin: 10px 0 8px;
            line-height: 1.35;
        }

        .enough-disclosure .topic-add-row {
            display: flex;
            gap: 6px;
            margin-bottom: 10px;
        }

        .enough-disclosure #blockTopicInput {
            flex: 1;
            min-width: 0;
            padding: 6px 8px;
            font-size: 12px;
            border: 1px solid #bdbdbd;
            border-radius: 4px;
        }

        .enough-disclosure #addBlockTopicBtn {
            width: auto;
            flex-shrink: 0;
            padding: 6px 10px;
            font-size: 12px;
            margin-top: 0;
        }

        .enough-disclosure #blockTopicsList {
            margin: 0;
            padding-left: 18px;
            font-size: 12px;
            max-height: 180px;
            overflow: auto;
        }

        .enough-disclosure #blockTopicsList li {
            margin: 4px 0;
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 8px;
        }

        .enough-disclosure .topic-remove {
            width: auto;
            padding: 2px 8px;
            font-size: 14px;
            line-height: 1.2;
            background: #95a5a6;
            margin-top: 0;
            flex-shrink: 0;
        }

        .enough-disclosure .topic-remove:hover {
            background: #7f8c8d;
        }
    </style>
</head>

<body>
    <h3>Nunus</h3>
    <details class="enough-disclosure">
        <summary title="Disclosure control (chevron shows open vs closed)">
            <span>Enough, already</span>
            <span class="chevron" aria-hidden="true"></span>
        </summary>
        <div class="disclosure-body">
            <p class="disclosure-hint">Stories are dimmed when <strong>every</strong> word you add appears somewhere in the headline or lede (words need not be next to each other). Case-insensitive.</p>
            <div class="topic-add-row">
                <input type="text" id="blockTopicInput" maxlength="200" placeholder="e.g. royal baby, Wordle" autocomplete="off">
                <button type="button" id="addBlockTopicBtn">Add</button>
            </div>
            <ul id="blockTopicsList"></ul>
        </div>
    </details>
    <button id="showViewedBtn" class="secondary-btn show-panel-btn">Show Viewed Articles</button>
    <button id="showNewlyViewedBtn" class="secondary-btn show-panel-btn">Show Newly Viewed Articles</button>
    <div id="status"></div>
    <div id="viewedResults"></div>
    <script src="ext-chrome-shim.js"></script>
    <script src="popup.js"></script>
</body>

</html>
